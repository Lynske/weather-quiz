                "score_0": "你处于一种静中有动的状态。你接受生活的平淡，但当机会敲门时，你也不排斥小小的尝试。这种中性的风速让你既能守住现有的领地，又能在必要时随风起舞，是一种极具适应力的生存状态。",
                "score_1_2": "你的内心深处始终涌动着细微的动能，你察觉到了现状中那些令人不快的不完美，并开始尝试进行小范围的改变。这种微风般的心理状态预示着你正在积蓄力量，准备寻找一个更有趣、更契合自我的生活出口。",
                "score_3_4": "你对现状有着极其清醒的察觉与不满。这种不安分的能量驱动着你不断去挑战、去迁徙、去打破那些束缚你的规则。你宁愿在剧烈的动荡中寻找自我，也不愿在凝滞的空气中日渐枯萎，生命在于不断的迁徙。",
                "score_5_6": "你对平庸的现状有着极其强烈的破坏欲望与重塑冲动。你宁愿在一次彻底的风暴中破碎，也要换取重新定义生命的可能。在你的哲学里，唯有在最剧烈的变革与冲突中，灵魂的真实色彩才会被彻底激发出来。"
            },
            "ION": {
                "score_-6_-5": "你完全隔绝了外界名利与权力的诱惑。你对物质的野心极低，转而追求精神世界绝对的清静与自由。这种极致的知足让你拥有一种超脱凡尘的平和智慧，你在极简的生活中找到了旁人无法触碰的终极满足。",
                "score_-4_-3": "你更看重当下的自洽与内心的安稳。过度的野心在你看来是一种沉重的负担，你更愿意在小确幸中寻找精神的支点。你深知欲望的无底洞，因此选择在适合自己的高度停下，享受那种不被他人定义的轻松。",
                "score_-2_-1": "你目前处于一种欲望的低频期，更在乎精神的平衡而非物质的扩张。这种知足并非消极的妥协，而是一种防御性的自我保护。你通过缩小欲望的边界，来换取生活的主动权，确保自己不被焦虑所吞噬。",
                "score_0": "你处于知足与进取之间的黄金分割点。你有自己的追求，但不会为此牺牲当下的快乐。你明白什么时候该放手博弈，也明白什么时候该举杯庆祝，这种中庸的电荷让你在社会竞争中显得游刃有余。",
                "score_1_2": "你的内心深处存在着不安分的潜流，开始渴望掌控更多的资源、话语权或自我实现的契机。这种微弱的野心正在你的潜意识中积蓄能量，准备在某个合适的契机化为向上的推力，带你去往更高的山峰。",
                "score_3_4": "你有着强烈的胜负欲和掌控全局的冲动，不甘于平庸的现状。你的灵魂深处积蓄着高压电荷，这种不安分的野心驱动着你去征服、去证明。你享受在竞争中胜出的快感，并以此作为衡量自我价值的标尺。",
                "score_5_6": "你有着极强的扩张欲和近乎绝对的征服感，不允许自己停留在任何平庸的层面上。这种极致的渴望让你时刻准备着在世界留下深刻且耀眼的痕迹。你像是一场蓄势待发的雷暴，注定要改写周围的权力磁场。"
            }
        };

        // ==================== 2. 数据读取 ====================
        // 固定维度显示顺序
        const dimOrder = ["TEMP", "HUM", "VIS", "WIND", "ION"];
        // 从网址获取人格编码
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code') || "00000";
        // 从本地存储获取测试分数
        const scores = JSON.parse(localStorage.getItem('quizScores') || '{"TEMP":0,"HUM":0,"VIS":0,"WIND":0,"ION":0}');

        // ==================== 3. 渲染标题与描述 ====================
        // 获取对应人格结果
        const res = weatherResults[code] || { title: "独特气象", quote: "你的气象独一无二。" };
        // 填入标题
        document.getElementById('result-title').innerText = `「${res.title}」`;
        // 填入描述语
        document.getElementById('result-quote').innerText = res.quote;

        // ==================== 4. 生成特质标签 ====================
        const tagsContainer = document.getElementById('tags-container');
        // 循环5个维度
        dimOrder.forEach((dim, i) => {
            // 判断当前维度是高分还是低分
            const isHigh = code[i] === "1";
            // 获取维度配置
            const config = dimensionLabels[dim];
            // 拼接标签HTML
            tagsContainer.innerHTML += `<span class="px-3 py-1.5 rounded-full bg-[#1a1a24] border border-[#2a2a36] text-[10px] text-[#c0c0c0] tracking-wider">${config.icon} ${isHigh ? config.high : config.low}</span>`;
        });

        // ==================== 5. 绘制雷达图 ====================
        function renderRadar() {
            // 雷达图尺寸、中心点、半径
            const size = 320, center = size / 2, radius = 85, angleStep = (Math.PI * 2) / 5;
            // 开始绘制SVG
            let svg = `<svg width="${size}" height="${size}" class="overflow-visible">`;

            // 绘制雷达网格线（4层）
            for (let l = 1; l <= 4; l++) {
                const r = radius * (l / 4);
                let gridPts = dimOrder.map((_, i) => `${center + r * Math.cos(angleStep * i - Math.PI / 2)},${center + r * Math.sin(angleStep * i - Math.PI / 2)}`).join(" ");
                svg += `<polygon points="${gridPts}" fill="none" stroke="#222" stroke-width="1"/>`;
            }

            // 绘制中心到顶点的分割线
            dimOrder.forEach((_, i) => {
                svg += `<line x1="${center}" y1="${center}" x2="${center + radius * Math.cos(angleStep * i - Math.PI / 2)}" y2="${center + radius * Math.sin(angleStep * i - Math.PI / 2)}" stroke="#222"/>`;
            });

            // 计算人格多边形顶点
            const pts = dimOrder.map((dim, i) => {
                const r = radius * (((scores[dim] + 6) / 12) * 0.8 + 0.2);
                return { x: center + r * Math.cos(angleStep * i - Math.PI / 2), y: center + r * Math.sin(angleStep * i - Math.PI / 2) };
            });

            // 绘制人格多边形
            svg += `<path d="${pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ')}Z" fill="rgba(106, 172, 239, 0.2)" stroke="#6aacef" stroke-width="2"/>`;

            // 绘制维度名称与分数
            dimOrder.forEach((dim, i) => {
                const x = center + (radius + 25) * Math.cos(angleStep * i - Math.PI / 2);
                const y = center + (radius + 25) * Math.sin(angleStep * i - Math.PI / 2);
                svg += `<text x="${x}" y="${y - 5}" text-anchor="middle" class="radar-label">${dimensionLabels[dim].name}</text><text x="${x}" y="${y + 10}" text-anchor="middle" class="radar-score">${scores[dim] > 0 ? '+' : ''}${scores[dim]}</text>`;
            });

            // 插入SVG到页面
            document.getElementById('radar-container').innerHTML = svg + `</svg>`;
        }
        // 执行雷达图绘制
        renderRadar();

        // ==================== 6. 生成气象编码 + 深度解析 ====================
        const codeBars = document.getElementById('code-bars');
        const codeLabels = document.getElementById('code-labels');
        const analysisContainer = document.getElementById('analysis-container');

        // 根据分数匹配解析文案的key
        function getScoreKey(s) {
            if (s <= -5) return "score_-6_-5";
            if (s <= -3) return "score_-4_-3";
            if (s <= -1) return "score_-2_-1";
            if (s === 0) return "score_0";
            if (s <= 2) return "score_1_2";
            if (s <= 4) return "score_3_4";
            return "score_5_6";
        }

        // 循环遍历 5 个维度（温度、湿度、能见度、风速、电离度）
        dimOrder.forEach(dim => {

            // 1. 获取当前维度的分数（例如：TEMP = 3）
            const s = scores[dim];
            // 2. 生成【气象编码】的数字方块（蓝色/灰色块）
            codeBars.innerHTML += `
                <div class="w-12 h-10 rounded-lg flex items-center justify-center font-bold text-sm 
                    ${s >= 0 
                        ? "bg-[#1a2a3a] text-[#6aacef]"  // 正数 → 蓝色背景
                        : "bg-[#16161a] text-[#555]"    // 负数 → 灰色背景
                    }">
                    ${s > 0 ? '+' + s : s}  <!-- 显示分数，正数前面加+号 -->
                </div>
            `;
            // 3. 生成【气象编码】下方的文字标签（温度、湿度...）
            codeLabels.innerHTML += `
                <span class="w-12 text-center text-[10px] text-[#666]">
                    ${dimensionLabels[dim].name}  <!-- 显示维度名称 -->
                </span>
            `;
            // 4. 获取当前维度对应的【深度解析文案】
            const text = dimensionComponents[dim][getScoreKey(s)];            
            // 5. 生成【深度解析卡片】            
            analysisContainer.innerHTML += `
                <div class="bg-[#0f0f15] rounded-3xl p-7 border border-[#1e1e26]">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-xl">${dimensionLabels[dim].icon}</span>  <!-- 图标 -->
                        <span class="text-xs text-[#e0ddd5] font-bold tracking-widest">
                            ${dimensionLabels[dim].name}  <!-- 维度名称 -->
                        </span>
                        <span class="text-[13px] text-[#6aacef] ml-auto font-mono">
                            ${s > 0 ? '+' : ''}${s}      <!-- 维度分数 -->
                        </span>
                    </div>
                    <p class="text-[13px] text-[#9ca3af] leading-relaxed tracking-wide">
                        ${text}  <!-- 深度解析文字 -->
                    </p>
                </div>
            `;
        });
    </script>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
